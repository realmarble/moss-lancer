<style>
  .tile{
      width: 150px;
      height: 150px;
      border: 3px black solid;
      display: flex; 
      justify-content: center; 
      align-items: center;
      transition: 0.1s;
      position: relative; 
      border-radius: 15px;
      margin: auto;
  }
  .tile:hover{
background-color: #6C756B;
  }
  #tilecontainer{
  display: grid;
  grid-template-columns: repeat(4, 25%);
  grid-template-rows: repeat(4, 1fr);
  }
  .tiletools {
  display: flex;
  justify-content: space-between;
  position: absolute;
  bottom: 5px;
  font-size: x-large;
  width: 100%;
}

.tiletools i {
  width: 33%;
  text-align: center;
}

  
  </style>
  <script>
  async function DeleteConfirm(id) {
    const confirmation = await Dialog.prompt({content: "Delete Assembly?"});
    if (!confirmation) {return;}
    MOSS.LocalStorage.Delete(id);
    rendertiles();
}
async function AssemblyEditor(id,object){
  new Dialog({
    title: "Assembly Editor",
    content: await renderTemplate("modules/moss-lancer/templates/assemblyeditor.hbs", {id:id,object:object}),
    buttons: {
      yes: {
        label: "Save Changes",
        callback: () => {
          AssemblyStorage.Update(id,JSON.parse(document.getElementsByName("assemblyeditortext")[0].value));try {rendertiles()} catch (e) {};
        }
      }
    },
      default: 'yes',
  },{width: 716,height: 720 }).render(true)  
}
  function rendertiles() {
    container = document.getElementById("tilecontainer")
    container.innerHTML=""
    if (MOSS.LocalStorage.Read().length != 0) {
      MOSS.LocalStorage.Read().forEach(element => {
      // if (element.MetaData == undefined) {
      //   console.log("Element without Metadata")
      //   return;
      // }
  div = document.createElement("div")
  div.classList.toggle("tile");
  div.innerHTML = `
  <span>${element.assemblyName}</span>
  <div class="tiletools">
    <i class="fa-solid fa-play"></i>
    <i class="fa-solid fa-pen-to-square"></i>
    <i class="fa-solid fa-trash"></i>
  </div>`
  container.appendChild(div)
  div.querySelector(".fa-play").addEventListener("click", function() {
    MOSS.PlayEffect(MOSS.Construct(element))
  });
  div.querySelector(".fa-trash").addEventListener("click", function() {
    DeleteConfirm(element.id)
  });
  div.querySelector(".fa-pen-to-square").addEventListener("click", async function() {
     AssemblyEditor(element.id,JSON.stringify(element,null,3))
  });
  })   
    } else {
      container.innerHTML=`<h1 style="top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    text-align: center;
    border-block-end-style: none;  
    color: black;
    position: absolute;  ">Nothing here yet.</h1>`
    }
  }
  rendertiles()
  </script>
  <div id="tilecontainer"></div>
