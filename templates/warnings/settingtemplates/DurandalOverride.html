<div>Primary color that fills the panel</div>
<input type="color" name="PrimaryColor" value="#FFFF00" /><br>
<div>Text color used for labels and body copy</div>
<input type="color" name="TextColor" value="#000000" /><br>
<div>Tint color used for the background overlay</div>
<input type="color" name="TintColor" value="#000000" /><br>
<input type="text" name="TintAlpha" min="0" max="1" step="0.05" placeholder="Opacity of the tint overlay (0.8 = 80%. set to 0 to disable)" /><br>
<input type="text" name="Duration" min="0" step="100" placeholder="How long the effect runs in milliseconds (if set to 0,runs indefinitely)" /><br>
<input type="text" name="PIDText" placeholder="PID label shown in the top-left" /><br>
<input type="text" name="ProtocolText" placeholder="Protocol label shown under the PID" /><br>
<input type="text" name="SubheaderText" placeholder="Large center header text" /><br>
<textarea name="StatusText" style="width: 100%;height: 90px;" placeholder="Right-side telemetry block"></textarea><br>
<textarea name="LabelText" style="width: 100%;height: 90px;" placeholder="Small label block near the bottom tab"></textarea><br>
<textarea name="BottomLogText" style="width: 100%;height: 110px;" placeholder="Lower log block beneath the tab"></textarea><br>
<input type="text" name="ScrollText" placeholder="Repeating strip word (Add a few spaces after for positioning)" /><br>
<input type="hidden" name="ScrollSpeed" placeholder="Speed of the horizontal strip movement" value="8"/><br>
<input type="text" name="IntroFinalText" placeholder="Final intro text shown during the reveal" /><br>
